<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aisly – Shared Shopping List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    .app-name { font-size: 22px; font-weight: 800; color: #1D9E75; margin-bottom: 24px; }
    .invite-box {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .invite-from { font-size: 14px; color: #6b7280; margin-bottom: 6px; }
    .invite-name { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
    .invite-message { font-size: 15px; color: #374151; line-height: 1.5; margin-bottom: 12px; }
    .perm-badge {
      display: inline-block;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-radius: 20px;
      padding: 4px 14px;
    }
    .perm-view   { background: #6b7280; }
    .perm-edit   { background: #7B2FBE; }
    .perm-shop   { background: #1D9E75; }
    .perm-invite { background: #f59e0b; }
    .open-btn {
      display: block;
      background: #1D9E75;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      border: none;
      width: 100%;
      margin-bottom: 14px;
    }
    .download-btn {
      display: block;
      background: #f3f4f6;
      color: #1a1a2e;
      font-size: 15px;
      font-weight: 600;
      border-radius: 14px;
      padding: 14px;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .status-msg { font-size: 13px; color: #1D9E75; margin-bottom: 12px; font-weight: 500; min-height: 20px; }
    .footer-note { font-size: 12px; color: #9ca3af; margin-top: 20px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <div class="app-name">Aisly</div>
    <div class="invite-box">
      <div class="invite-from">You've been invited to a shopping list</div>
      <div class="invite-name" id="invitee-name"></div>
      <div class="invite-message">Tap below to open the shared list in the Aisly app.</div>
      <span class="perm-badge" id="perm-badge"></span>
    </div>
    <div class="status-msg" id="status-msg"></div>
    <button class="open-btn" id="open-btn">Open in Aisly</button>
    <a href="https://play.google.com/store/apps/details?id=com.ofervilm.myapp" class="download-btn">
      📲 Don't have Aisly? Download free
    </a>
    <div class="footer-note">
      Aisly helps you compare grocery prices across Tesco, Sainsbury's, Asda, Waitrose &amp; more.<br/>
      Free to download on Android.
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const shareId  = params.get('id')   || '';
    const name     = params.get('name') || '';
    const perm     = params.get('perm') || 'can_shop';

    const PROJECT  = 'myapp-e1696';
    const API_KEY  = 'AIzaSyBUg_dpHC2BA3GGXAmahAJwQKn52DTNvUQ';
    const BASE     = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents/sharedLists/${shareId}`;
    const deepLink = `aisly://shared/${shareId}`;

    const permLabels = {
      view_only:  { label: '👁️ View only',  cls: 'perm-view'   },
      can_edit:   { label: '✏️ Can edit',    cls: 'perm-edit'   },
      can_shop:   { label: '🛒 Can shop',    cls: 'perm-shop'   },
      can_invite: { label: '👥 Can invite',  cls: 'perm-invite' },
    };
    const permInfo = permLabels[perm] || permLabels['can_shop'];

    document.getElementById('invitee-name').textContent = name || 'You';
    const badge = document.getElementById('perm-badge');
    badge.textContent = permInfo.label;
    badge.classList.add(permInfo.cls);

    document.getElementById('open-btn').addEventListener('click', async () => {
      document.getElementById('status-msg').textContent = 'Opening Aisly…';

      try {
        // Read current invitees
        const getRes  = await fetch(`${BASE}?key=${API_KEY}`);
        const getData = await getRes.json();

        let invitees = [];
        if (getData.fields?.invitees?.arrayValue?.values) {
          invitees = getData.fields.invitees.arrayValue.values;
        }

        // Only add if not already in the list
        const alreadyThere = invitees.some(v =>
          v.mapValue?.fields?.name?.stringValue === name
        );

        if (!alreadyThere && name) {
          invitees.push({
            mapValue: {
              fields: {
                name:       { stringValue: name },
                permission: { stringValue: perm },
                status:     { stringValue: 'active' },
              }
            }
          });
        }

        // Write back — add invitee as active + set isActive true
        await fetch(
          `${BASE}?updateMask.fieldPaths=isActive&updateMask.fieldPaths=invitees&key=${API_KEY}`,
          {
            method:  'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: {
                isActive: { booleanValue: true },
                invitees: { arrayValue: { values: invitees } },
              }
            })
          }
        );
      } catch (e) {
        console.error('Firestore error:', e);
      }

      window.location.href = deepLink;

      setTimeout(() => {
        document.getElementById('status-msg').textContent = "Didn't open? Download Aisly first 👇";
        document.getElementById('open-btn').textContent = 'Try again';
      }, 2500);
    });
  </script>
</body>
</html>
