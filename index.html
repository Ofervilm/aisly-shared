<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aisly – Opening shared list…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f8f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    .app-name { font-size: 28px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .tagline { font-size: 14px; color: #888; margin-bottom: 32px; }
    .message { font-size: 16px; color: #1a1a2e; font-weight: 600; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 32px; line-height: 1.5; }
    .open-btn {
      display: block;
      background: #1D9E75;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .install-link { font-size: 13px; color: #1D9E75; text-decoration: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e8e8e8;
      border-top-color: #1D9E75;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <div class="app-name">aisly</div>
    <div class="tagline">Compare. Save. Shop smarter.</div>
    <div class="spinner" id="spinner"></div>
    <div class="message" id="message">Opening shared list…</div>
    <div class="sub" id="sub">If the app doesn't open automatically, tap the button below.</div>
    <a class="open-btn" id="openBtn" href="#">Open in Aisly</a>
    <a class="install-link" href="https://play.google.com/store/apps/details?id=com.aisly.grocery">
      Don't have Aisly? Download it free →
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const shareId = params.get('id') || window.location.pathname.split('/').pop();
    const recipientName = params.get('name') || null;
    const permission = params.get('perm') || 'can_edit';
    const deepLink = `aisly://shared/${shareId}`;
    const PROJECT = 'myapp-e1696';
    const API_KEY = 'AIzaSyBUg_dpHC2BA3GGXAmahAJwQKn52DTNvUQ';
    const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents/sharedLists/${shareId}`;

    document.getElementById('openBtn').href = deepLink;

    async function activateSharedList() {
      try {
        // Get existing invitees first
        const getRes = await fetch(`${BASE}?key=${API_KEY}`);
        const getData = await getRes.json();
        const existingInvitees = getData.fields?.invitees?.arrayValue?.values?.map(v => 
          v.mapValue ? {
            name: v.mapValue.fields?.name?.stringValue || '',
            permission: v.mapValue.fields?.permission?.stringValue || 'can_shop',
            status: v.mapValue.fields?.status?.stringValue || 'pending'
          } : { name: v.stringValue || '', permission: 'can_shop', status: 'pending' }
        ) || [];

        // Update existing invitee status to 'active' or add new one
        const newInvitees = existingInvitees.some(i => i.name === recipientName)
          ? existingInvitees.map(i => i.name === recipientName ? { ...i, status: 'active' } : i)
          : [...existingInvitees, { name: recipientName, permission: permission, status: 'active' }];

        const fields = { isActive: { booleanValue: true } };
        if (newInvitees.length > 0) {
          fields.invitees = { arrayValue: { values: newInvitees.map(i => ({ 
            mapValue: { fields: { 
              name: { stringValue: i.name }, 
              permission: { stringValue: i.permission },
              status: { stringValue: i.status || 'active' }
            }}
          })) } };
        }

        const res = await fetch(`${BASE}?updateMask.fieldPaths=isActive&updateMask.fieldPaths=invitees&key=${API_KEY}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields })
        });
        const data = await res.json();
        console.log('Firestore response:', res.status, data);
      } catch(e) {
        console.error('Firestore error:', e);
      }
      window.location.href = deepLink;
    }

    if (shareId) {
      activateSharedList();
    } else {
      window.location.href = deepLink;
    }

    setTimeout(() => {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').textContent = 'Tap below to open your list';
    }, 2500);
  </script>
</body>
</html>
