<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aisly – You've been invited!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
    .sub { font-size: 16px; color: #6b7280; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: block;
      background: #1D9E75;
      color: #fff;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .btn-secondary {
      display: block;
      background: #f3f4f6;
      color: #1a1a2e;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .status { font-size: 13px; color: #aaa; }
    .loading { color: #1D9E75; font-size: 15px; margin: 16px 0; }
    .error { color: #ef4444; font-size: 14px; margin: 16px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <h1 id="title">You've been invited!</h1>
    <p class="sub" id="subtitle">Loading your invite...</p>
    <p class="loading" id="status">Activating your invite...</p>
    <a id="openBtn" class="btn" style="display:none">Open in Aisly</a>
    <a id="downloadBtn" class="btn-secondary" href="https://play.google.com/store/apps/details?id=com.aisly.grocery" style="display:none">Download Aisly Free</a>
    <p class="status" id="footer"></p>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBqXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
      authDomain: "myapp-e1696.firebaseapp.com",
      projectId: "myapp-e1696",
      storageBucket: "myapp-e1696.appspot.com",
      messagingSenderId: "XXXXXXXXXXXX",
      appId: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function activate() {
      const params = new URLSearchParams(window.location.search);
      const shareId = params.get('id');
      const name    = params.get('name');
      const perm    = params.get('perm');

      const titleEl    = document.getElementById('title');
      const subtitleEl = document.getElementById('subtitle');
      const statusEl   = document.getElementById('status');
      const openBtn    = document.getElementById('openBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const footerEl   = document.getElementById('footer');

      if (!shareId || !name) {
        titleEl.textContent = 'Invalid link';
        subtitleEl.textContent = 'This invite link is missing some information. Please ask the sender to resend it.';
        statusEl.textContent = '';
        return;
      }

      const decodedName = decodeURIComponent(name);
      const decodedPerm = decodeURIComponent(perm || 'can_shop');

      titleEl.textContent = `Hi ${decodedName}! 👋`;

      try {
        const docRef = doc(db, 'sharedLists', shareId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          statusEl.textContent = '';
          subtitleEl.textContent = 'This invite link has expired or is no longer valid.';
          return;
        }

        const data = docSnap.data();
        const ownerName = data.ownerName || 'Someone';
        subtitleEl.textContent = `${ownerName} has invited you to their Aisly shopping list!`;

        // Update invitee status from pending → active
        const invitees = data.invitees || [];
        const updated = invitees.map(i =>
          i.name === decodedName
            ? { ...i, status: 'active', permission: decodedPerm, activatedAt: new Date().toISOString() }
            : i
        );

        // If invitee not in list yet (old links), add them
        if (!invitees.some(i => i.name === decodedName)) {
          updated.push({
            name: decodedName,
            permission: decodedPerm,
            status: 'active',
            activatedAt: new Date().toISOString(),
          });
        }

        await setDoc(docRef, { invitees: updated, isActive: true }, { merge: true });

        statusEl.textContent = '✅ You\'re all set!';
        footerEl.textContent = `You joined as: ${decodedName}`;

        // Deep link to open Aisly app
        const deepLink = `aisly://shared?id=${shareId}&name=${encodeURIComponent(decodedName)}`;
        openBtn.href = deepLink;
        openBtn.style.display = 'block';
        downloadBtn.style.display = 'block';

        // Try to open app automatically
        window.location.href = deepLink;

      } catch (e) {
        statusEl.className = 'error';
        statusEl.textContent = 'Something went wrong. Please try opening the link again.';
        console.error(e);
      }
    }

    activate();
  </script>
</body>
</html>
